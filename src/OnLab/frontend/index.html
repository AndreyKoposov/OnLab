<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent for Process Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Анализ технологического процесса</h1>
        
        <div class="input-section">
            <h2>Описание процесса</h2>
            <textarea id="processText" rows="10" placeholder="Введите описание технологического процесса..."></textarea>
            <button onclick="analyzeProcess()">Анализировать</button>
        </div>
        
        <div class="result-section" id="resultSection" style="display: none;">
            <h2>Результаты анализа</h2>
            
            <div class="tabs">
                <button class="tab-button active" onclick="showTab('graph')">Граф процесса</button>
                <button class="tab-button" onclick="showTab('stages')">Этапы</button>
                <button class="tab-button" onclick="showTab('bifurcations')">Точки бифуркации</button>
                <button class="tab-button" onclick="showTab('model')">Предиктивная модель</button>
            </div>
            
            <div id="graphTab" class="tab-content active">
                <div id="graphContainer"></div>
                <p class="hint">* Здесь будет визуализация графа (D3.js или vis.js)</p>
            </div>
            
            <div id="stagesTab" class="tab-content">
                <div id="stagesList"></div>
            </div>
            
            <div id="bifurcationsTab" class="tab-content">
                <div id="bifurcationsList"></div>
            </div>
            
            <div id="modelTab" class="tab-content">
                <div class="model-section">
                    <h3>Загрузить данные для обучения</h3>
                    <input type="file" id="dataFile" accept=".csv,.xlsx">
                    <button onclick="uploadData()">Загрузить</button>
                    <div id="modelResults"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
